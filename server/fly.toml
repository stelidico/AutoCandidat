app = "autocandidat-api"
primary_region = "cdg"

[build]

[env]
  NODE_ENV = "production"
  DB_PATH = "/data/autocandidat.db"
  PORT = "8080"
  # ANTHROPIC_API_KEY doit être défini via : fly secrets set ANTHROPIC_API_KEY="sk-ant-..."

[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
