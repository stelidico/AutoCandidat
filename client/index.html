    <!-- Données structurées JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Autocandidat",
      "url": "https://autocandidat.fr",

        {
          "@type": "Offer",
          "name": "Essai Gratuit",
          "price": "0",
          "priceCurrency": "EUR",
          "description": "10 candidatures automatiques gratuites à l'inscription"
        },
        {
          "@type": "Offer",
          "name": "Forfait 80 candidatures",
          "price": "19.99",
          "priceCurrency": "EUR",

        {
          "@type": "Offer",
          "name": "Forfait 150 candidatures",

        "@type": "AggregateRating",

    <script type="application/ld+json">
